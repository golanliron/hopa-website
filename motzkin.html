<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בוגרים מוצקין | הופה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #F7F7F7; direction: rtl; color: #111; }

    /* ---- SEARCH ---- */
    .search-hero { background: #000; padding: 28px 24px 32px; }
    .search-box {
      background: #fff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      max-width: 580px;
      width: 100%;
    }
    .search-box input {
      border: none; outline: none; font-size: 1rem;
      flex: 1; background: transparent; direction: rtl;
    }
    .search-box .search-icon { color: #999; font-size: 1.1rem; }

    /* ---- KPI ---- */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .kpi-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #E5E5E5;
      padding: 16px 18px;
    }
    .kpi-num { font-size: 1.9rem; font-weight: 800; line-height: 1; color: #111; }
    .kpi-lbl { font-size: 0.74rem; color: #666; margin-top: 4px; }
    .kpi-accent { border-top: 3px solid #FFF200; }

    /* ---- TABS ---- */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid #E5E5E5; }
    .tab {
      padding: 10px 20px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: all 0.15s; white-space: nowrap;
    }
    .tab.active { color: #111; border-bottom-color: #FFF200; }
    .tab:hover:not(.active) { color: #333; }

    /* ---- FILTERS ---- */
    .chip {
      display: inline-flex; align-items: center;
      padding: 5px 14px; border-radius: 20px; font-size: 0.78rem;
      border: 1px solid #E5E5E5; background: #fff; cursor: pointer;
      color: #444; transition: all 0.15s; white-space: nowrap;
    }
    .chip.active { background: #FFF200; border-color: #FFF200; color: #000; font-weight: 700; }
    .chip:hover:not(.active) { border-color: #999; }

    /* ---- GRADUATE LIST ---- */
    .grad-row {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 12px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .grad-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .grad-header {
      display: grid;
      grid-template-columns: 1fr 120px 130px 130px 40px;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      cursor: pointer;
    }
    .grad-name { font-weight: 700; font-size: 0.92rem; }
    .grad-phone { font-size: 0.8rem; color: #555; direction: ltr; unicode-bidi: isolate; }
    .grad-details {
      display: none;
      padding: 0 16px 14px;
      border-top: 1px solid #F0F0F0;
      margin-top: 0;
    }
    .grad-details.open { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; }
    .detail-item { font-size: 0.8rem; }
    .detail-label { color: #888; margin-bottom: 1px; }
    .detail-value { color: #111; font-weight: 500; }

    /* ---- BADGES ---- */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.71rem;
      font-weight: 600;
    }
    .badge-yellow { background: #FFF200; color: #000; }
    .badge-gray   { background: #F0F0F0; color: #444; }
    .badge-red    { background: #FFE8E8; color: #C00; }
    .badge-green  { background: #E6F9EE; color: #1a7a3c; }
    .badge-blue   { background: #E8F0FF; color: #1a3ca0; }
    .badge-orange { background: #FFF3E0; color: #b45309; }

    /* ---- BIRTHDAY ---- */
    .bday-card {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .bday-date-box {
      background: #FFF200;
      border-radius: 10px;
      padding: 6px 12px;
      text-align: center;
      min-width: 56px;
    }
    .bday-day { font-size: 1.4rem; font-weight: 800; line-height: 1; }
    .bday-month { font-size: 0.7rem; font-weight: 600; }

    /* ---- PRIORITY ---- */
    .priority-item {
      background: #fff;
      border: 1px solid #E5E5E5;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.83rem;
    }

    /* ---- MISC ---- */
    .btn-monday {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 12px; border-radius: 8px;
      background: #000; color: #fff; font-size: 0.74rem; font-weight: 600;
      text-decoration: none; transition: background 0.15s; white-space: nowrap;
    }
    .btn-monday:hover { background: #333; }
    .btn-yellow {
      background: #FFF200; color: #000; border: none;
      border-radius: 8px; padding: 7px 18px; font-weight: 700;
      cursor: pointer; font-size: 0.85rem; transition: background 0.15s;
    }
    .btn-yellow:hover { background: #E6D900; }
    .empty-txt { text-align: center; color: #aaa; font-size: 0.88rem; padding: 32px 0; }
    .spinner {
      border: 3px solid #E5E5E5; border-top: 3px solid #FFF200;
      border-radius: 50%; width: 20px; height: 20px;
      animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-label {
      font-size: 0.72rem; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
    }

    /* ---- PAGINATION ---- */
    .page-btn {
      border: 1px solid #E5E5E5; background: #fff;
      border-radius: 6px; padding: 4px 11px;
      cursor: pointer; font-size: 0.8rem; color: #333;
    }
    .page-btn:hover:not(:disabled) { background: #FFF200; border-color: #FFF200; }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-btn.curr { background: #000; color: #fff; border-color: #000; }

    @media (max-width: 640px) {
      .grad-header { grid-template-columns: 1fr 100px 36px; }
      .grad-header .grad-phone,
      .grad-header .grad-what { display: none; }
      .grad-details.open { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="bg-black text-white px-5 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <span style="color:#FFF200;font-weight:900;font-size:1.15rem;letter-spacing:-0.5px">הופה</span>
    <span style="color:#fff;opacity:0.2">|</span>
    <span style="font-weight:600;font-size:0.9rem">בוגרים מוצקין</span>
  </div>
  <div class="flex items-center gap-3">
    <div id="spinner" class="spinner hidden"></div>
    <span id="lastUpdated" style="font-size:0.72rem;color:#888">טרם נטען</span>
    <button class="btn-yellow" onclick="loadData()">⟳ רענן</button>
  </div>
</header>

<!-- SEARCH HERO -->
<div class="search-hero">
  <div style="color:#fff;font-size:0.78rem;opacity:0.6;margin-bottom:12px">חיפוש בוגר</div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="שם, טלפון, עיר..." oninput="applyFilters()" autocomplete="off" />
    <span id="searchCount" style="font-size:0.75rem;color:#aaa;white-space:nowrap"></span>
  </div>
</div>

<main style="max-width:900px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px;">

  <!-- KPIs -->
  <section>
    <div class="kpi-grid">
      <div class="kpi-card kpi-accent">
        <div class="kpi-num" id="kpi-total">—</div>
        <div class="kpi-lbl">סה"כ בוגרים</div>
      </div>
      <div class="kpi-card kpi-accent">
        <div class="kpi-num" id="kpi-touched">—</div>
        <div class="kpi-lbl">יש לנו מידע</div>
      </div>
      <div class="kpi-card kpi-accent">
        <div class="kpi-num" id="kpi-working">—</div>
        <div class="kpi-lbl">עובדים</div>
      </div>
      <div class="kpi-card kpi-accent">
        <div class="kpi-num" id="kpi-army">—</div>
        <div class="kpi-lbl">בצבא</div>
      </div>
      <div class="kpi-card kpi-accent">
        <div class="kpi-num" id="kpi-callback">—</div>
        <div class="kpi-lbl">לחזור אליהם</div>
      </div>
      <div class="kpi-card kpi-accent">
        <div class="kpi-num" id="kpi-thisweek">—</div>
        <div class="kpi-lbl">שיחה השבוע</div>
      </div>
    </div>
  </section>

  <!-- TABS -->
  <section style="background:#fff;border-radius:16px;border:1px solid #E5E5E5;overflow:hidden;">
    <div style="padding:16px 20px 0;">
      <div class="tabs" id="tabs">
        <div class="tab active" onclick="switchTab('graduates',this)">📋 כל הבוגרים</div>
        <div class="tab" onclick="switchTab('priority',this)">⚡ דחופים</div>
        <div class="tab" onclick="switchTab('birthdays',this)">🎂 ימי הולדת</div>
      </div>
    </div>

    <!-- TAB: GRADUATES -->
    <div id="tab-graduates" style="padding:16px 20px;">

      <!-- Filter chips -->
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;">
        <span style="font-size:0.75rem;color:#888">מה עושה:</span>
        <div class="chip active" onclick="setFilter('what','',this)">הכל</div>
        <div class="chip" onclick="setFilter('what','חייל',this)">חייל/ת</div>
        <div class="chip" onclick="setFilter('what','עובד',this)">עובד/ת</div>
        <div class="chip" onclick="setFilter('what','לימודים',this)">לימודים</div>
        <div class="chip" onclick="setFilter('what','לא עובד',this)">לא עובד</div>
        <div class="chip" onclick="setFilter('what','מכינה',this)">מכינה</div>
        <div id="resCount" style="margin-right:auto;font-size:0.75rem;color:#999"></div>
      </div>

      <!-- List -->
      <div id="gradList">
        <div class="empty-txt">טוען נתונים מ-Monday.com...</div>
      </div>

      <!-- Pagination -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;" id="paginationWrap">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>→ הקודם</button>
        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;" id="pageButtons"></div>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">הבא ←</button>
      </div>
    </div>

    <!-- TAB: PRIORITY -->
    <div id="tab-priority" style="padding:16px 20px;display:none;">
      <div id="priorityList"><div class="empty-txt">טוען...</div></div>
    </div>

    <!-- TAB: BIRTHDAYS -->
    <div id="tab-birthdays" style="padding:16px 20px;display:none;">
      <div id="birthdayList"><div class="empty-txt">טוען...</div></div>
    </div>

  </section>

</main>

<script>
const MONDAY_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjU1MTE3ODY0MCwiYWFpIjoxMSwidWlkIjo3OTYwODg1MSwiaWFkIjoiMjAyNS0wOC0xN1QxNDoyMjowMS4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MzA3Mjc0MDAsInJnbiI6ImV1YzEifQ.v08TgFNEtd9pBcws4lpRs-8TVxAW3YBAuOOPP3IYo4Q';
const BOARD_ID = '5090710409';
const API_URL  = 'https://api.monday.com/v2';

// Column IDs — Motzkin specific
const C = {
  lastName:   'text_mkvbye47',
  phone:      'phone_mkvb5qwz',
  phoneText:  'text_mm0vv7rt',
  gender:     'text_mkvwa8nb',
  year:       'color_mm0mssvc',
  city:       'text_mkvwnmm4',
  major:      'color_mm0mjsj8',
  service:    'color_mkw0rdsg',
  whatToday:  'color_mkw4et1p',
  impact:     'color_mkvwbt7y',
  notes:      'dropdown_mm0p4kps',
  hopaNotes:  'long_text_mkw0p90p',
  lastTalk:   'date_mkvw1gnh',
  nextTalk:   'date_mkvw7ytx',
  answeredQ:  'color_mm0p98aw',
  birthday:   'date_mkbday000',  // ← עדכן ל-ID האמיתי של עמודת יום הולדת
};

let ALL = [];
let FILTERED = [];
let PAGE = 1;
const PER_PAGE = 25;
const FILTERS = { what: '' };

// ─── Helpers ─────────────────────────────────────────────
function colText(item, id) {
  const c = (item.column_values||[]).find(x=>x.id===id);
  if (!c) return '';
  if (c.text) return c.text.trim();
  try {
    const v = JSON.parse(c.value||'{}');
    if (v && v.chosenValues) return v.chosenValues.map(x=>x.name).join(', ');
  } catch(e){}
  return '';
}

function colDate(item, id) {
  const c = (item.column_values||[]).find(x=>x.id===id);
  return c&&c.text ? c.text.trim() : '';
}

function parseDate(str) {
  if (!str) return null;
  const m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}

function fmtDate(str) {
  const d = parseDate(str);
  return d ? d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function mondayLink(id) {
  return `https://hopa-org.monday.com/boards/${BOARD_ID}/pulses/${id}`;
}

function parseItem(item) {
  const phone = colText(item,C.phone)||colText(item,C.phoneText);
  return {
    id: item.id,
    name: item.name||'',
    lastName: colText(item,C.lastName),
    fullName: [item.name, colText(item,C.lastName)].filter(Boolean).join(' ')||'—',
    phone,
    gender: colText(item,C.gender),
    year: colText(item,C.year),
    city: colText(item,C.city),
    major: colText(item,C.major),
    service: colText(item,C.service),
    whatToday: colText(item,C.whatToday),
    impact: colText(item,C.impact),
    notes: colText(item,C.notes),
    hopaNotes: colText(item,C.hopaNotes),
    lastTalk: colDate(item,C.lastTalk),
    nextTalk: colDate(item,C.nextTalk),
    birthday: colDate(item,C.birthday),
  };
}

function isTouched(g) {
  return !!(g.whatToday||g.notes||g.impact||g.lastTalk||g.hopaNotes);
}

function isWorking(g) {
  const w=(g.whatToday||'').toLowerCase();
  return w.includes('עובד')||w.includes('עבודה')||w.includes('בעל עסק');
}

function isArmy(g) {
  return (g.whatToday||'').includes('חייל')||(g.service||'').includes('מ"ל');
}

// ─── Status badge ─────────────────────────────────────────
function whatBadge(w) {
  if (!w) return '';
  if (w.includes('חייל')||w.includes('צבא')) return `<span class="badge badge-blue">${esc(w)}</span>`;
  if (isWorking({whatToday:w})) return `<span class="badge badge-green">${esc(w)}</span>`;
  if (w.includes('לימוד')||w.includes('מכינה')) return `<span class="badge badge-orange">${esc(w)}</span>`;
  return `<span class="badge badge-gray">${esc(w)}</span>`;
}

// ─── API ──────────────────────────────────────────────────
async function fetchPage(cursor) {
  const cp = cursor ? `, cursor: "${cursor}"` : '';
  const ids = Object.values(C).map(id=>`"${id}"`).join(',');
  const q = `{
    boards(ids:[${BOARD_ID}]) {
      items_page(limit:500${cp}) {
        cursor
        items { id name column_values(ids:[${ids}]) { id text value } }
      }
    }
  }`;
  const r = await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':MONDAY_TOKEN,'API-Version':'2024-10'},
    body:JSON.stringify({query:q}),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.errors) throw new Error(d.errors[0].message);
  const pg = d.data.boards[0].items_page;
  return {items:pg.items, cursor:pg.cursor};
}

async function loadData() {
  document.getElementById('spinner').classList.remove('hidden');
  document.getElementById('gradList').innerHTML = '<div class="empty-txt">טוען...</div>';
  try {
    let items=[], cursor=null;
    do {
      const r = await fetchPage(cursor);
      items = items.concat(r.items);
      cursor = r.cursor;
    } while(cursor);

    ALL = items.map(parseItem);
    FILTERED = [...ALL];
    PAGE = 1;

    updateKPIs();
    applyFilters();
    renderPriority();
    renderBirthdays();

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'עודכן ' + now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('gradList').innerHTML =
      `<div class="empty-txt" style="color:#e00">שגיאה: ${esc(e.message)}</div>`;
  } finally {
    document.getElementById('spinner').classList.add('hidden');
  }
}

// ─── KPIs ─────────────────────────────────────────────────
function updateKPIs() {
  const today = new Date(); today.setHours(0,0,0,0);
  const w7 = new Date(today); w7.setDate(w7.getDate()+7);

  const callback = ALL.filter(g => {
    const d = parseDate(g.nextTalk);
    return (g.notes||'').includes('לחזור') || (d && d >= today);
  }).length;

  document.getElementById('kpi-total').textContent = ALL.length;
  document.getElementById('kpi-touched').textContent = ALL.filter(isTouched).length;
  document.getElementById('kpi-working').textContent = ALL.filter(isWorking).length;
  document.getElementById('kpi-army').textContent = ALL.filter(isArmy).length;
  document.getElementById('kpi-callback').textContent = callback;
  document.getElementById('kpi-thisweek').textContent = ALL.filter(g=>{
    const d = parseDate(g.nextTalk);
    return d && d>=today && d<=w7;
  }).length;
}

// ─── Filters ──────────────────────────────────────────────
function setFilter(type, val, btn) {
  FILTERS[type] = val;
  btn.closest('.tabs, div').querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  PAGE = 1;
  applyFilters();
}

function applyFilters() {
  const search = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  FILTERED = ALL.filter(g => {
    if (search) {
      const hay = (g.fullName+' '+g.phone+' '+g.city).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    if (FILTERS.what && !(g.whatToday||'').includes(FILTERS.what)) return false;
    return true;
  });
  PAGE = 1;
  renderList();
  document.getElementById('searchCount').textContent =
    search||FILTERS.what ? `${FILTERED.length} תוצאות` : '';
  document.getElementById('resCount').textContent =
    FILTERED.length < ALL.length ? `${FILTERED.length} מתוך ${ALL.length}` : `${ALL.length} בוגרים`;
}

// ─── Graduate list ────────────────────────────────────────
function renderList() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = (PAGE-1)*PER_PAGE;
  const slice = FILTERED.slice(start, start+PER_PAGE);
  const container = document.getElementById('gradList');

  if (!slice.length) {
    container.innerHTML = '<div class="empty-txt">לא נמצאו בוגרים</div>';
    renderPagination();
    return;
  }

  container.innerHTML = slice.map((g,i) => {
    const overdue = parseDate(g.nextTalk) && parseDate(g.nextTalk) < today;
    const borderColor = overdue ? 'border-color:#FFE8E8;' : '';

    const noteBadge = g.notes ? `<span class="badge badge-gray">${esc(g.notes.split(',')[0].trim())}</span>` : '';
    const impactBadge = g.impact ? `<span class="badge badge-green">${esc(g.impact)}</span>` : '';

    return `<div class="grad-row" id="row-${start+i}" style="${borderColor}">
      <div class="grad-header" onclick="toggleRow(${start+i})">
        <div>
          <div class="grad-name">${esc(g.fullName)}</div>
          ${noteBadge||impactBadge ? `<div style="margin-top:3px">${noteBadge}${impactBadge?` ${impactBadge}`:''}</div>` : ''}
        </div>
        <div class="grad-phone">${esc(g.phone)||'—'}</div>
        <div style="font-size:0.8rem">${whatBadge(g.whatToday)}</div>
        <div style="font-size:0.75rem;color:#888">
          ${g.nextTalk ? `<span style="${overdue?'color:#c00;font-weight:700':''}">שיחה: ${fmtDate(g.nextTalk)}</span>` : g.lastTalk ? `אחרונה: ${fmtDate(g.lastTalk)}` : ''}
        </div>
        <div style="font-size:1rem;color:#bbb;text-align:center">▾</div>
      </div>
      <div class="grad-details" id="details-${start+i}">
        ${detailGrid(g)}
      </div>
    </div>`;
  }).join('');

  renderPagination();
}

function detailGrid(g) {
  const rows = [
    ['שנת סיום', g.year],
    ['עיר', g.city],
    ['מגמה', g.major],
    ['שירות', g.service],
    ['שיחה אחרונה', fmtDate(g.lastTalk)],
    ['שיחה הבאה', fmtDate(g.nextTalk)],
    ['ענה לשאלון', g.answeredQ||'—'],
    ['הערות', g.hopaNotes],
  ].filter(r=>r[1]);

  const fields = rows.map(([lbl,val])=>`
    <div class="detail-item">
      <div class="detail-label">${lbl}</div>
      <div class="detail-value">${esc(val)}</div>
    </div>`).join('');

  return `${fields}
    <div class="detail-item" style="grid-column:1/-1;margin-top:4px;">
      <a href="${mondayLink(g.id)}" target="_blank" class="btn-monday">פתח ב-Monday ↗</a>
    </div>`;
}

function toggleRow(idx) {
  const d = document.getElementById(`details-${idx}`);
  d.classList.toggle('open');
}

// ─── Pagination ───────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(FILTERED.length / PER_PAGE);
  document.getElementById('prevBtn').disabled = PAGE<=1;
  document.getElementById('nextBtn').disabled = PAGE>=total;

  const pb = document.getElementById('pageButtons');
  pb.innerHTML = '';
  for (let i=1;i<=total;i++) {
    if (i===1||i===total||Math.abs(i-PAGE)<=1) {
      const b = document.createElement('button');
      b.textContent = i;
      b.className = 'page-btn'+(i===PAGE?' curr':'');
      b.onclick = ()=>{PAGE=i;renderList();};
      pb.appendChild(b);
    } else if (pb.lastChild&&pb.lastChild.textContent!=='...') {
      const s=document.createElement('span');
      s.textContent='...'; s.style.cssText='padding:4px 4px;color:#aaa;font-size:0.8rem;';
      pb.appendChild(s);
    }
  }

  document.getElementById('paginationWrap').style.display = total<=1 ? 'none' : 'flex';
}

function changePage(dir) {
  const total = Math.ceil(FILTERED.length / PER_PAGE);
  PAGE = Math.max(1, Math.min(total, PAGE+dir));
  renderList();
}

// ─── Priority tab ─────────────────────────────────────────
function renderPriority() {
  const today = new Date(); today.setHours(0,0,0,0);
  const list = ALL.filter(g=>{
    const d = parseDate(g.nextTalk);
    return (d && d < today) || ((g.notes||'').includes('לחזור') && !g.nextTalk);
  }).slice(0,12);

  const c = document.getElementById('priorityList');
  if (!list.length) {
    c.innerHTML = '<div class="empty-txt">אין פעולות דחופות כרגע 👍</div>';
    return;
  }
  c.innerHTML = `<div class="section-label">בוגרים שמחכים לחזרה</div>
    <div style="display:flex;flex-direction:column;gap:6px;">
    ${list.map(g=>{
      const d = parseDate(g.nextTalk);
      const overdue = d && d < today;
      return `<div class="priority-item">
        <div style="flex:1">
          <div style="font-weight:700;font-size:0.88rem">${esc(g.fullName)}</div>
          ${g.notes ? `<div style="font-size:0.75rem;color:#888;margin-top:1px">${esc(g.notes)}</div>` : ''}
        </div>
        <div style="font-size:0.75rem;color:${overdue?'#c00':'#666'};white-space:nowrap">
          ${g.nextTalk ? fmtDate(g.nextTalk) : 'אין תאריך'}
        </div>
        ${overdue ? '<span class="badge badge-red">פגה תוקף</span>' : '<span class="badge badge-yellow">לחזור</span>'}
        <a href="${mondayLink(g.id)}" target="_blank" class="btn-monday">↗</a>
      </div>`;
    }).join('')}
    </div>`;
}

// ─── Birthdays tab ────────────────────────────────────────
const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function renderBirthdays() {
  const container = document.getElementById('birthdayList');
  const today = new Date(); today.setHours(0,0,0,0);

  // Filter graduates with birthday data
  const withBday = ALL.filter(g => g.birthday);

  if (!withBday.length) {
    container.innerHTML = `
      <div class="empty-txt" style="padding:40px 16px;">
        <div style="font-size:2rem;margin-bottom:8px">🎂</div>
        <div style="font-weight:600;color:#555;margin-bottom:6px">לא נמצאה עמודת ימי הולדת</div>
        <div style="font-size:0.8rem;color:#aaa">יש להוסיף עמודת תאריך של יום הולדת בלוח Monday.com<br>ולעדכן את ה-ID בקוד (C.birthday)</div>
      </div>`;
    return;
  }

  // Upcoming 60 days
  const d60 = new Date(today); d60.setDate(d60.getDate()+60);
  const upcoming = [];
  const past = [];

  withBday.forEach(g => {
    const bday = parseDate(g.birthday);
    if (!bday) return;
    // Compare month+day
    const thisYear = new Date(today.getFullYear(), bday.getMonth(), bday.getDate());
    if (thisYear >= today && thisYear <= d60) {
      upcoming.push({...g, bdayDate: thisYear, daysLeft: Math.round((thisYear-today)/(86400000))});
    } else {
      // Try next year
      const nextYear = new Date(today.getFullYear()+1, bday.getMonth(), bday.getDate());
      if (nextYear >= today && nextYear <= new Date(d60.getTime()+365*86400000)) {
        upcoming.push({...g, bdayDate: nextYear, daysLeft: Math.round((nextYear-today)/(86400000))});
      } else {
        past.push({...g, bdayDate: thisYear});
      }
    }
  });

  upcoming.sort((a,b) => a.daysLeft - b.daysLeft);

  let html = `<div class="section-label">ימי הולדת קרובים (60 יום הקרובים)</div>`;
  if (!upcoming.length) {
    html += '<div style="color:#aaa;font-size:0.85rem;margin-bottom:20px">אין ימי הולדת בחודשיים הקרובים</div>';
  } else {
    html += `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
      ${upcoming.map(g=>{
        const isToday = g.daysLeft === 0;
        const isSoon = g.daysLeft <= 7;
        return `<div class="bday-card" style="${isToday?'border-color:#FFF200;':''}">
          <div class="bday-date-box">
            <div class="bday-day">${g.bdayDate.getDate()}</div>
            <div class="bday-month">${HE_MONTHS[g.bdayDate.getMonth()]}</div>
          </div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:0.9rem">${esc(g.fullName)}</div>
            <div style="font-size:0.75rem;color:#888;margin-top:2px">
              ${isToday ? '🎉 היום!' : isSoon ? `בעוד ${g.daysLeft} ימים` : `בעוד ${g.daysLeft} ימים`}
              ${g.phone ? ` · ${esc(g.phone)}` : ''}
            </div>
          </div>
          ${isToday ? '<span class="badge badge-yellow">היום!</span>' : ''}
          ${isSoon&&!isToday ? '<span class="badge badge-orange">השבוע</span>' : ''}
          <a href="${mondayLink(g.id)}" target="_blank" class="btn-monday">↗</a>
        </div>`;
      }).join('')}
    </div>`;
  }

  container.innerHTML = html;
}

// ─── Tabs ─────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['graduates','priority','birthdays'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none';
  });
}

// ─── Init ─────────────────────────────────────────────────
loadData();
</script>
