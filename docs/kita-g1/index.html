<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תודה לאסתי — כיתה ג'1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  color: white;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ROTATING COLORFUL BACKGROUNDS */
.bg-1  { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fdfcfb 100%); }
.bg-2  { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
.bg-3  { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
.bg-4  { background: linear-gradient(135deg, #fdcbf1 0%, #e6dee9 50%, #a1c4fd 100%); }
.bg-5  { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
.bg-6  { background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%); }
.bg-7  { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
.bg-8  { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
.bg-9  { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); }
.bg-10 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }

/* Floating hearts */
.hearts-bg {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 1; overflow: hidden;
}
.hearts-bg span {
  position: absolute; font-size: 1.8rem; opacity: 0.15;
  animation: floatHeart 12s ease-in-out infinite;
}
@keyframes floatHeart {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.15; }
  90%  { opacity: 0.15; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* START SCREEN */
#start-screen {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 200; cursor: pointer;
}
#start-screen h1 { font-size: 3.5rem; font-weight: 900; text-shadow: 2px 4px 12px rgba(0,0,0,0.4); animation: pulse 2s ease infinite; }
#start-screen .play-icon { font-size: 5rem; margin: 1.5rem 0; animation: pulse 1.5s ease infinite; }
#start-screen p { font-size: 1.3rem; font-weight: 300; opacity: 0.8; margin-top: 0.5rem; }

/* INTRO */
#intro {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}
#intro h1 { font-size: 4rem; font-weight: 900; text-shadow: 2px 4px 12px rgba(0,0,0,0.4); opacity: 0; }
#intro h2 { font-size: 2.2rem; font-weight: 300; margin-top: 0.8rem; opacity: 0; }
#intro .heart { font-size: 5rem; margin-top: 1.5rem; opacity: 0; }
#intro .school { font-size: 1.4rem; font-weight: 400; margin-top: 1rem; opacity: 0; }
#intro .year { font-size: 1.1rem; font-weight: 300; margin-top: 0.5rem; opacity: 0; }

/* OUTRO */
#outro {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #fda085 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}
#outro h1 { font-size: 3.2rem; font-weight: 900; text-shadow: 2px 4px 12px rgba(0,0,0,0.3); animation: slideUp 0.8s ease 0.3s both; }
#outro h2 { font-size: 1.8rem; font-weight: 400; margin-top: 1rem; animation: slideUp 0.8s ease 0.8s both; text-align: center; line-height: 1.6; }
#outro .hearts { font-size: 3.5rem; margin-top: 1.5rem; animation: pulse 1.2s ease infinite, slideUp 0.8s ease 1.3s both; }
#outro .from { font-size: 1.5rem; font-weight: 300; margin-top: 2rem; animation: slideUp 0.8s ease 1.8s both; text-align: center; line-height: 2; }

/* SLIDESHOW */
#slideshow {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  transition: background 0.8s ease;
}

.slide {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: none; align-items: center; justify-content: center; flex-direction: column;
  z-index: 2; padding: 2vh 2vw;
}

/* TWO-PHOTO slide: row layout */
.slide.dual-photo {
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.photo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2vw;
  max-height: 75vh;
}
.photo-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

/* PHOTO — centered, not fullscreen */
.slide img {
  max-width: 44vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  animation: kenBurns 4s ease-in-out both;
}

/* Dual photo slide — smaller images to fit both */
.slide.dual-photo img {
  max-width: 42vw;
  max-height: 65vh;
}

@keyframes kenBurns {
  0%   { transform: scale(1); }
  100% { transform: scale(1.06); }
}

/* Single photo slide — larger image */
.slide.single-photo img {
  max-width: 85vw;
  max-height: 80vh;
}

/* Slide transition animations */
@keyframes enterZoomRotate {
  0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
  60%  { transform: scale(1.03) rotate(1deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes enterSlideRight {
  0%   { transform: translateX(100vw) scale(0.8); opacity: 0; }
  70%  { transform: translateX(-2vw) scale(1.02); opacity: 1; }
  100% { transform: translateX(0) scale(1); opacity: 1; }
}
@keyframes enterFlip {
  0%   { transform: perspective(800px) rotateY(90deg) scale(0.8); opacity: 0; }
  60%  { transform: perspective(800px) rotateY(-5deg) scale(1.02); opacity: 1; }
  100% { transform: perspective(800px) rotateY(0deg) scale(1); opacity: 1; }
}
@keyframes enterZoomBounce {
  0%   { transform: scale(0); opacity: 0; }
  50%  { transform: scale(1.15); opacity: 1; }
  70%  { transform: scale(0.95); }
  85%  { transform: scale(1.03); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes enterSlideUp {
  0%   { transform: translateY(80vh); opacity: 0; }
  60%  { transform: translateY(-3vh); opacity: 1; }
  80%  { transform: translateY(1vh); }
  100% { transform: translateY(0); opacity: 1; }
}
@keyframes enterSwing {
  0%   { transform: rotate(-15deg) scale(0.5); opacity: 0; transform-origin: top center; }
  50%  { transform: rotate(5deg) scale(1.05); opacity: 1; }
  70%  { transform: rotate(-2deg) scale(1); }
  100% { transform: rotate(0deg) scale(1); opacity: 1; }
}

/* COLORFUL CAPTION PILL */
.caption {
  text-align: center; margin-top: 1rem;
  padding: 0.5rem 1.5rem; border-radius: 50px;
  min-width: 140px; position: relative; z-index: 3; opacity: 0;
}
@keyframes captionEnter {
  0%   { transform: translateY(30px) scale(0.9); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

/* Shared caption for dual slides */
.shared-caption {
  text-align: center; margin-top: 1.2rem;
  padding: 0.6rem 2rem; border-radius: 50px;
  min-width: 200px; position: relative; z-index: 3; opacity: 0;
}

.cap-1  { background: linear-gradient(90deg, #ff6b6b, #ee5a24); color: white; }
.cap-2  { background: linear-gradient(90deg, #a55eea, #8854d0); color: white; }
.cap-3  { background: linear-gradient(90deg, #0abde3, #48dbfb); color: white; }
.cap-4  { background: linear-gradient(90deg, #ff9ff3, #f368e0); color: white; }
.cap-5  { background: linear-gradient(90deg, #feca57, #ff9f43); color: #333; }
.cap-6  { background: linear-gradient(90deg, #1dd1a1, #10ac84); color: white; }
.cap-7  { background: linear-gradient(90deg, #54a0ff, #2e86de); color: white; }
.cap-8  { background: linear-gradient(90deg, #ff6348, #ff4757); color: white; }
.cap-9  { background: linear-gradient(90deg, #5f27cd, #341f97); color: white; }
.cap-10 { background: linear-gradient(90deg, #00d2d3, #01a3a4); color: white; }

.caption-month { font-size: 0.85rem; font-weight: 300; opacity: 0.85; margin-bottom: 0.1rem; letter-spacing: 2px; }
.caption-title { font-size: 1.5rem; font-weight: 700; text-shadow: 1px 2px 6px rgba(0,0,0,0.2); }

/* Text slides */
.text-slide { z-index: 2; }
.text-message {
  font-size: 3.5rem; font-weight: 900; text-align: center;
  text-shadow: 3px 6px 20px rgba(0,0,0,0.3); padding: 2rem 3rem; line-height: 1.4;
  animation: textPop 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
}
@keyframes textPop {
  0%   { transform: scale(0.3) rotate(-5deg); opacity: 0; }
  60%  { transform: scale(1.08) rotate(1deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Controls */
#music-controls {
  position: fixed; top: 2vh; right: 3vw; z-index: 60;
  display: flex; align-items: center; gap: 8px;
}
#music-btn {
  background: rgba(255,255,255,0.25); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3); color: white;
  width: 44px; height: 44px; border-radius: 50%;
  font-size: 1.3rem; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.3s;
}
#music-btn:hover { background: rgba(255,255,255,0.4); }
#song-name {
  font-size: 0.75rem; color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.2); padding: 4px 12px;
  border-radius: 12px; backdrop-filter: blur(8px); white-space: nowrap;
}

#progress-bar {
  position: fixed; bottom: 0; left: 0; height: 4px;
  background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
  background-size: 200% 100%; animation: gradientFlow 3s ease infinite;
  z-index: 50; transition: width 0.4s ease;
}
#counter {
  position: fixed; top: 2vh; left: 3vw;
  font-size: 0.85rem; font-weight: 300; opacity: 0.5; z-index: 50; color: #555;
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Mobile: stack vertically */
@media (max-width: 700px) {
  .photo-row { flex-direction: column; gap: 1.5vh; }
  .slide img { max-width: 90vw; max-height: 35vh; }
  .slide.dual-photo img { max-width: 90vw; max-height: 32vh; }
  .slide.single-photo img { max-width: 92vw; max-height: 75vh; }
}
</style>
</head>

// Group into display slides: pair consecutive photos, text slides stay alone
const SLIDES = [];
let i = 0;
while (i < PHOTOS.length) {
  if (PHOTOS[i].type === 'text') {
    SLIDES.push({ type: 'text', title: PHOTOS[i].title });
    i++;
  } else {
    // Photo — try to pair with next photo
    if (i + 1 < PHOTOS.length && PHOTOS[i + 1].type === 'photo') {
      SLIDES.push({
        type: 'dual',
        photo1: PHOTOS[i],
        photo2: PHOTOS[i + 1],
        title: PHOTOS[i].title,
        month: PHOTOS[i].month
      });
      i += 2;
    } else {
      // Single photo (odd one out)
      SLIDES.push({ type: 'single', photo: PHOTOS[i], title: PHOTOS[i].title, month: PHOTOS[i].month });
      i++;
    }
  }
}

const TOTAL = SLIDES.length;
const TRANSITIONS = ['enterZoomRotate','enterSlideRight','enterFlip','enterZoomBounce','enterSlideUp','enterSwing'];
const BG_COUNT = 10;
const CAP_COUNT = 10;
const SLIDE_DURATION = 4000;
let current = 0;
let autoPlay = true;
let timer = null;
let musicMuted = false;

// Build slide DOM
const slideshow = document.getElementById('slideshow');
SLIDES.forEach((s, idx) => {
  const div = document.createElement('div');
  div.id = 'slide-' + idx;
  div.dataset.transition = TRANSITIONS[idx % TRANSITIONS.length];

  if (s.type === 'text') {
    div.className = 'slide text-slide';
    div.innerHTML = '<div class="text-message">' + s.title + '</div>';
  } else if (s.type === 'dual') {
    div.className = 'slide dual-photo';
    div.innerHTML =
      '<div class="photo-row">' +
        '<div class="photo-cell"><img src="img/' + s.photo1.image + '" alt="' + s.photo1.title + '" loading="lazy"></div>' +
        '<div class="photo-cell"><img src="img/' + s.photo2.image + '" alt="' + s.photo2.title + '" loading="lazy"></div>' +
      '</div>' +
      '<div class="shared-caption caption">' +
        '<div class="caption-month">' + s.month + '</div>' +
        '<div class="caption-title">' + s.title + '</div>' +
      '</div>';
  } else {
    // single photo
    div.className = 'slide single-photo';
    div.innerHTML =
      '<img src="img/' + s.photo.image + '" alt="' + s.photo.title + '" loading="lazy">' +
      '<div class="caption">' +
        '<div class="caption-month">' + s.month + '</div>' +
        '<div class="caption-title">' + s.title + '</div>' +
      '</div>';
  }
  slideshow.appendChild(div);
});

// Preload
function preloadAhead(n) {
  for (let j = n; j < Math.min(n + 8, TOTAL); j++) {
    const s = SLIDES[j];
    if (s.type === 'dual') {
      new window.Image().src = 'img/' + s.photo1.image;
      new window.Image().src = 'img/' + s.photo2.image;
    } else if (s.type === 'single') {
      new window.Image().src = 'img/' + s.photo.image;
    }
  }
}

// Preload ALL images in background on page load
(function() {
  PHOTOS.forEach(function(p) {
    if (p.type === 'photo' && p.image) {
      var img = new window.Image();
      img.src = 'img/' + p.image;
    }
  });
})();

// Hearts
(function() {
  const c = document.getElementById('hearts-bg');
  const h = ['\u2764\uFE0F','\uD83D\uDC9B','\uD83D\uDC99','\uD83D\uDC9C','\uD83E\uDDE1','\u2764\uFE0F'];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('span');
    s.textContent = h[i % h.length];
    s.style.left = (Math.random() * 100) + '%';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.animationDuration = (10 + Math.random() * 8) + 's';
    s.style.fontSize = (1.2 + Math.random() * 1.5) + 'rem';
    c.appendChild(s);
  }
})();

// Music
const songEl = document.getElementById('song');
function playMusic() {
  songEl.volume = 0.5;
  songEl.play().then(() => {
    document.getElementById('song-name').textContent = '\u05de\u05d9\u05e9\u05dc \u2014 \u05e0\u05d5\u05e2\u05dd \u05d1\u05ea\u05df';
  }).catch(() => {});
}
function toggleMusic(e) {
  e.stopPropagation();
  if (musicMuted) {
    songEl.play();
    document.getElementById('music-btn').innerHTML = '&#9835;';
    musicMuted = false;
  } else {
    songEl.pause();
    document.getElementById('music-btn').innerHTML = '&#128263;';
    musicMuted = true;
  }
}

// Start
let showStarted = false;
function startShow() {
  if (showStarted) return;
  showStarted = true;
  document.getElementById('start-screen').style.display = 'none';
  const intro = document.getElementById('intro');
  intro.style.display = 'flex';
  intro.style.animation = 'fadeOut 1.2s ease 5s forwards';
  intro.querySelector('h1').style.animation = 'slideUp 1s ease 0.3s both';
  intro.querySelector('h2').style.animation = 'slideUp 1s ease 0.8s both';
  intro.querySelector('.heart').style.animation = 'pulse 1.2s ease infinite, slideUp 1s ease 1.3s both';
  intro.querySelector('.school').style.animation = 'slideUp 1s ease 2s both';
  intro.querySelector('.year').style.animation = 'slideUp 1s ease 2.5s both';
  playMusic();
  preloadAhead(0);
  setTimeout(() => { showSlide(0); startAuto(); }, 5500);
}

// Slideshow
function showSlide(n) {
  document.querySelectorAll('.slide').forEach(s => s.style.display = 'none');

  if (n >= TOTAL) {
    document.getElementById('outro').style.display = 'flex';
    document.getElementById('counter').style.display = 'none';
    document.getElementById('hearts-bg').style.display = 'none';
    clearInterval(timer);
    return;
  }

  // Background
  for (let j = 1; j <= BG_COUNT; j++) slideshow.classList.remove('bg-' + j);
  slideshow.classList.add('bg-' + ((n % BG_COUNT) + 1));

  const slide = document.getElementById('slide-' + n);
  if (slide) {
    slide.style.display = 'flex';
    const imgs = slide.querySelectorAll('img');
    const cap = slide.querySelector('.caption');
    const textMsg = slide.querySelector('.text-message');
    const trans = slide.dataset.transition;

    if (textMsg) {
      textMsg.style.animation = 'none';
      void textMsg.offsetHeight;
      textMsg.style.animation = 'textPop 0.8s cubic-bezier(0.23, 1, 0.32, 1) both';
    }

    imgs.forEach((imgEl, idx) => {
      imgEl.style.animation = 'none';
      void imgEl.offsetHeight;
      imgEl.style.animation = trans + ' 1.2s cubic-bezier(0.23, 1, 0.32, 1) ' + (idx * 0.2) + 's both, kenBurns 4s ease-in-out ' + (idx * 0.2) + 's both';
    });

    if (cap) {
      for (let j = 1; j <= CAP_COUNT; j++) cap.classList.remove('cap-' + j);
      cap.classList.add('cap-' + ((n % CAP_COUNT) + 1));
      cap.style.animation = 'none';
      void cap.offsetHeight;
      cap.style.animation = 'captionEnter 0.8s ease 0.5s both';
    }
  }

  preloadAhead(n + 1);
  document.getElementById('progress-bar').style.width = ((n + 1) / TOTAL * 100) + '%';
  document.getElementById('counter').textContent = (n + 1) + ' / ' + TOTAL;
  current = n;
}

function next() { showSlide(current + 1); }
function prev() { if (current > 0) showSlide(current - 1); }
function startAuto() { timer = setInterval(next, SLIDE_DURATION); }

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowRight') { e.preventDefault(); next(); }
  else if (e.code === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.code === 'KeyP') {
    if (autoPlay) { clearInterval(timer); autoPlay = false; }
    else { startAuto(); autoPlay = true; }
  }
  else if (e.code === 'KeyM') { toggleMusic(e); }
});

document.addEventListener('click', (e) => {
  if (e.target.id === 'music-btn') return;
  next();
});
</script>
</body>
</html>
