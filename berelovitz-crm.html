<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berelowitz Foundation - CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#2B2D42;--warm:#C4B89B;--light:#F0EDED;--lighter:#FAF9F7;--white:#fff;--green:#2e7d32;--blue:#1565c0;--orange:#e65100;--purple:#7b1fa2;--red:#c62828}
body{font-family:'Heebo','Inter',sans-serif;background:var(--light);color:var(--ink);line-height:1.6;min-height:100vh}

/* Header */
.header{background:var(--ink);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.header-right{display:flex;align-items:center;gap:16px}
.header h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:28px;color:var(--white);letter-spacing:1px}
.header h1 em{color:var(--warm);font-style:italic;font-weight:400}
.header .subtitle{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:1px}

/* Stats bar */
.stats-bar{background:var(--ink);padding:0 40px 20px;display:flex;gap:16px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.08);border-radius:10px;padding:12px 20px;text-align:center;min-width:120px;border:1px solid rgba(196,184,155,.15)}
.stat .num{font-size:24px;font-weight:700;color:var(--warm)}
.stat .label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Controls */
.controls{padding:20px 40px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:var(--white);border-bottom:1px solid #e0e0e0}
.search-box{flex:1;min-width:250px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 44px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:'Heebo',sans-serif;transition:all .3s;background:var(--white)}
.search-box input:focus{outline:none;border-color:var(--warm);box-shadow:0 0 0 3px rgba(196,184,155,.2)}
.search-box::before{content:'🔍';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;opacity:.4}
.filter-btn{padding:10px 20px;border:2px solid #e0e0e0;border-radius:10px;background:var(--white);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;transition:all .3s;color:var(--ink)}
.filter-btn:hover,.filter-btn.active{border-color:var(--warm);background:var(--ink);color:var(--white)}
.view-toggle{display:flex;border:2px solid #e0e0e0;border-radius:10px;overflow:hidden}
.view-toggle button{padding:10px 16px;border:none;background:var(--white);cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;transition:all .3s;color:var(--ink)}
.view-toggle button.active{background:var(--ink);color:var(--white)}
.count-badge{font-size:13px;color:#8D8D8D;padding:10px 0}

/* Cards grid */
.cards-grid{padding:20px 40px;display:grid;grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));gap:16px}
.card{background:var(--white);border-radius:12px;padding:20px;cursor:pointer;transition:all .3s;border:2px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card:hover{border-color:var(--warm);box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-org{font-size:16px;font-weight:700;color:var(--ink);line-height:1.4}
.card-amount{font-size:15px;font-weight:700;color:var(--ink);white-space:nowrap;background:var(--lighter);padding:4px 12px;border-radius:8px}
.card-track{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:8px}
.track-kalvia{background:#e8f5e9;color:#2e7d32}
.track-shaagat{background:#fff3e0;color:#e65100}
.track-kolkore{background:#e3f2fd;color:#1565c0}
.track-doch{background:#fce4ec;color:#c62828}
.track-hashlama{background:#f3e5f5;color:#7b1fa2}
.card-what{font-size:13px;color:#666;line-height:1.6;margin-top:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:12px;margin-top:12px;font-size:12px;color:#999;flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:4px}

/* Table view */
.table-container{padding:20px 40px;overflow-x:auto}
.crm-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);font-size:13px}
.crm-table thead{background:var(--ink);color:var(--white)}
.crm-table th{padding:14px 12px;text-align:right;font-weight:500;font-size:12px;position:sticky;top:68px;z-index:10;background:var(--ink);white-space:nowrap;cursor:pointer;user-select:none}
.crm-table th:hover{background:#3a3c56}
.crm-table th .sort-arrow{margin-right:4px;opacity:.4;font-size:10px}
.crm-table th.sorted .sort-arrow{opacity:1;color:var(--warm)}
.crm-table td{padding:10px 12px;border-bottom:1px solid #eee;vertical-align:top;line-height:1.6;max-width:300px}
.crm-table tr{cursor:pointer;transition:background .2s}
.crm-table tr:hover td{background:#f9f7f4}
.crm-table .org-cell{font-weight:700;color:var(--ink);white-space:nowrap}
.crm-table .amount-cell{font-weight:700;white-space:nowrap}
.crm-table .truncate{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:250px}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{background:var(--ink);padding:28px 32px;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10}
.modal-header h2{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:26px;color:var(--white);letter-spacing:1px}
.modal-header .modal-track{margin-top:6px}
.modal-close{position:absolute;top:20px;left:20px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:transparent;color:var(--white);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.modal-close:hover{background:rgba(255,255,255,.1)}
.modal-body{padding:28px 32px}
.modal-section{margin-bottom:24px}
.modal-section-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--warm);font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--light)}
.modal-section-content{font-size:14px;color:#444;line-height:1.8;white-space:pre-wrap}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.modal-field{background:var(--lighter);border-radius:8px;padding:12px 16px}
.modal-field-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;font-weight:500;margin-bottom:4px}
.modal-field-value{font-size:14px;color:var(--ink);font-weight:500}
.modal-field-value a{color:var(--blue);text-decoration:none}
.modal-field-value a:hover{text-decoration:underline}
.modal-amount{font-size:28px;font-weight:700;color:var(--ink);text-align:center;padding:16px;background:var(--lighter);border-radius:12px;margin-bottom:24px}
.modal-amount span{font-size:14px;font-weight:400;color:#999;display:block;margin-top:4px}

/* Export button */
.export-btn{padding:10px 20px;border:2px solid var(--warm);border-radius:10px;background:transparent;cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;color:var(--ink);transition:all .3s}
.export-btn:hover{background:var(--warm);color:var(--white)}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:16px}

/* Responsive */
@media(max-width:768px){
  .header{padding:16px 20px;flex-direction:column;gap:8px}
  .stats-bar{padding:0 20px 16px;gap:8px}
  .stat{min-width:80px;padding:8px 12px}
  .stat .num{font-size:18px}
  .controls{padding:12px 20px;gap:10px}
  .cards-grid{padding:12px 20px;grid-template-columns:1fr}
  .table-container{padding:12px 20px}
  .modal-body{padding:20px}
  .modal-grid{grid-template-columns:1fr}
  .search-box{min-width:unset}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-right">
    <div>
      <h1>Berelowitz Foundation <em>CRM</em></h1>

  </div>

  </div>
</div>

let currentFilter = 'all';
let currentView = 'cards';
let sortCol = null;
let sortDir = 1;

function parseAmount(v) {
  if (!v) return 0;
  return parseFloat(String(v).replace(/[^\d.]/g, '')) || 0;
}

function formatAmount(v) {
  const n = parseAmount(v);
  if (!n) return String(v);
  return n.toLocaleString('he-IL') + ' \u20AA';
}

function trackBadge(track) {
  const t = trackMap[track] || {cls:'', label: track};
  return '<span class="card-track ' + t.cls + '">' + t.label + '</span>';
}

function renderStats() {
  const total = DATA.length;
  const totalAmount = DATA.reduce((s,d) => s + parseAmount(d.amount), 0);
  const tracks = {};
  DATA.forEach(d => { tracks[d.track] = (tracks[d.track]||0) + 1; });

  let html = '<div class="stat"><div class="num">' + total + '</div><div class="label">Total Orgs</div></div>';
  html += '<div class="stat"><div class="num">' + totalAmount.toLocaleString('he-IL') + ' \u20AA</div><div class="label">Total Grants</div></div>';
  for (const [track, count] of Object.entries(tracks)) {
    const t = trackMap[track] || {label: track};
    html += '<div class="stat"><div class="num">' + count + '</div><div class="label">' + t.label + '</div></div>';
  }
  document.getElementById('statsBar').innerHTML = html;

  // Filter buttons
  let btns = '<button class="filter-btn active" onclick="setFilter(\'all\',this)">הכל (' + total + ')</button>';
  for (const [track, count] of Object.entries(tracks)) {
    const t = trackMap[track] || {label: track};
    btns += '<button class="filter-btn" onclick="setFilter(\'' + track + '\',this)">' + t.label + ' (' + count + ')</button>';
  }
  document.getElementById('filterButtons').innerHTML = btns;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return DATA.filter(d => {
    if (currentFilter !== 'all' && d.track !== currentFilter) return false;
    if (!q) return true;
    const searchable = [d.org, d.project, d.contact, d.email, d.what_for, d.notes, d.results, d.track].join(' ').toLowerCase();
    return q.split(/\s+/).every(word => searchable.includes(word));
  });
}

function renderCards(list) {
  if (!list.length) {
    document.getElementById('cardsView').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>לא נמצאו תוצאות</p></div>';
    return;
  }
  let html = '';
  list.forEach((d, i) => {
    const idx = DATA.indexOf(d);
    html += '<div class="card" onclick="openModal(' + idx + ')">';
    html += '<div class="card-header"><div class="card-org">' + esc(d.org) + '</div>';
    html += '<div class="card-amount">' + formatAmount(d.amount) + '</div></div>';
    html += trackBadge(d.track);
    if (d.project) html += ' <span style="font-size:12px;color:#666">' + esc(d.project) + '</span>';
    if (d.what_for) html += '<div class="card-what">' + esc(d.what_for) + '</div>';
    html += '<div class="card-meta">';
    if (d.contact) html += '<span>👤 ' + esc(d.contact) + '</span>';
    if (d.email) html += '<span>✉ ' + esc(d.email) + '</span>';
    if (d.beneficiaries) html += '<span>👥 ' + esc(String(d.beneficiaries).substring(0,40)) + '</span>';
    html += '</div></div>';
  });
  document.getElementById('cardsView').innerHTML = html;
}

function renderTable(list) {
  if (!list.length) {
    document.getElementById('tableView').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>לא נמצאו תוצאות</p></div>';
    return;
  }
  const cols = ['org','track','amount','project','contact','email','phone','what_for','beneficiaries','results'];
  let html = '<table class="crm-table"><thead><tr>';
  cols.forEach(c => {
    const arrow = sortCol === c ? (sortDir === 1 ? '▲' : '▼') : '⇅';
    const cls = sortCol === c ? ' sorted' : '';
    html += '<th class="' + cls + '" onclick="sortTable(\'' + c + '\')"><span class="sort-arrow">' + arrow + '</span>' + fieldLabels[c] + '</th>';
  });
  html += '</tr></thead><tbody>';
  list.forEach((d, i) => {
    const idx = DATA.indexOf(d);
    html += '<tr onclick="openModal(' + idx + ')">';
    cols.forEach(c => {
      let val = d[c] || '';
      if (c === 'org') html += '<td class="org-cell">' + esc(val) + '</td>';
      else if (c === 'amount') html += '<td class="amount-cell">' + formatAmount(val) + '</td>';
      else if (c === 'track') html += '<td>' + trackBadge(val) + '</td>';
      else if (c === 'email') html += '<td><a href="mailto:' + esc(val) + '">' + esc(val) + '</a></td>';
      else html += '<td><div class="truncate">' + esc(String(val).substring(0,150)) + '</div></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tableView').innerHTML = html;
}

function filterData() {
  const list = getFiltered();
  document.getElementById('countBadge').textContent = list.length + ' / ' + DATA.length + ' עמותות';
  if (currentView === 'cards') renderCards(list);
  else renderTable(list);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterData();
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('cardsView').style.display = v === 'cards' ? 'grid' : 'none';
  document.getElementById('tableView').style.display = v === 'table' ? 'block' : 'none';
  filterData();
}

function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  filterData();
  // Re-sort the displayed list
  const list = getFiltered().sort((a, b) => {
    let va = a[col] || '', vb = b[col] || '';
    if (col === 'amount') return (parseAmount(va) - parseAmount(vb)) * sortDir;
    return String(va).localeCompare(String(vb), 'he') * sortDir;
  });
  renderTable(list);
}

function openModal(idx) {
  const d = DATA[idx];
  document.getElementById('modalTitle').textContent = d.org;
  document.getElementById('modalTrack').innerHTML = trackBadge(d.track);

  let html = '';

  // Amount hero
  html += '<div class="modal-amount">' + formatAmount(d.amount) + '<span>סכום המענק</span></div>';

  // Contact info grid
  const contactFields = [
    {k:'contact', icon:'👤'},
    {k:'email', icon:'✉'},
    {k:'phone', icon:'📱'},
    {k:'timestamp', icon:'📅'}
  ];
  const hasContact = contactFields.some(f => d[f.k]);
  if (hasContact) {
    html += '<div class="modal-section"><div class="modal-section-title">פרטי קשר</div><div class="modal-grid">';
    contactFields.forEach(f => {
      if (d[f.k]) {
        let val = esc(String(d[f.k]));
        if (f.k === 'email') val = '<a href="mailto:' + val + '">' + val + '</a>';
        if (f.k === 'phone') val = '<a href="tel:' + val + '">' + val + '</a>';
        if (f.k === 'timestamp') val = val.substring(0, 10);
        html += '<div class="modal-field"><div class="modal-field-label">' + fieldLabels[f.k] + '</div><div class="modal-field-value">' + val + '</div></div>';
      }
    });
    html += '</div></div>';
  }

  // Project info
  if (d.project) {
    html += '<div class="modal-section"><div class="modal-section-title">שם הפרויקט</div><div class="modal-section-content">' + esc(d.project) + '</div></div>';
  }

  // Long text fields
  const textFields = ['what_for','problem','beneficiaries','results','measurement','budget_use','notes'];
  textFields.forEach(f => {
    if (d[f]) {
      html += '<div class="modal-section"><div class="modal-section-title">' + fieldLabels[f] + '</div><div class="modal-section-content">' + esc(String(d[f])) + '</div></div>';
    }
  });

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function exportCSV() {
  const list = getFiltered();
  const fields = ['org','track','project','amount','contact','email','phone','what_for','beneficiaries','problem','results','measurement','budget_use','notes'];
  let csv = '\uFEFF' + fields.map(f => fieldLabels[f]).join(',') + '\n';
  list.forEach(d => {
    csv += fields.map(f => {
      let v = String(d[f] || '').replace(/"/g, '""').replace(/\n/g, ' ');
      return '"' + v + '"';
    }).join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'berelovitz_crm_export.csv';
  a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
renderStats();
filterData();
</script>
</body>
</html>
